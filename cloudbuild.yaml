steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mediashield-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mediashield-backend:latest'
      - './backend'

  # Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/mediashield-backend'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'mediashield-backend'
      - '--image=gcr.io/$PROJECT_ID/mediashield-backend:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--timeout=300'
      - '--set-env-vars=GEMINI_API_KEY=$_GEMINI_API_KEY'

substitutions:
  _GEMINI_API_KEY: ''   # Set in Cloud Build trigger substitutions

images:
  - 'gcr.io/$PROJECT_ID/mediashield-backend'

options:
  logging: CLOUD_LOGGING_ONLY
