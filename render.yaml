services:
  - type: web
    name: mediashield-backend
    runtime: docker
    plan: starter
    rootDir: backend
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "https://mediasheild-ai.vercel.app"
      - key: PORT
        value: "8080"
    disk:
      name: mediashield-data
      mountPath: /app/data
      sizeGB: 1
