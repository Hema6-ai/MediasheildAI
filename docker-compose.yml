version: "3.9"

services:
  backend:
    build: ./backend
    container_name: mediashield-backend
    ports:
      - "8000:8080"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CORS_ORIGINS=http://localhost:3000
      - AUTO_BOOTSTRAP_DATASET=true
    volumes:
      - ./backend/data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: node:20-alpine
    container_name: mediashield-frontend
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      # Browser connects to backend from host machine — localhost:8000 is correct here
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend
